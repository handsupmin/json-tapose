name: Build Installables

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-installables-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-and-extension:
    name: Web and browser extension
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build web app
        run: pnpm build

      - name: Build browser extension
        run: pnpm build:extension

      - name: Upload web app artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

      - name: Upload browser extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-unpacked
          path: dist-extension
          if-no-files-found: error

  desktop-macos:
    name: Desktop macOS (${{ matrix.arch }})
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.runner }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop renderer
        run: pnpm build:desktop-renderer

      - name: Build desktop main process
        run: pnpm build:desktop-main

      - name: Package macOS desktop app
        run: pnpm exec electron-builder --mac dmg --${{ matrix.arch }} --config electron-builder.yml --publish never

      - name: Upload macOS desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-${{ matrix.arch }}
          path: release/*.dmg
          if-no-files-found: error

  desktop-windows:
    name: Desktop Windows (x64)
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop renderer
        run: pnpm build:desktop-renderer

      - name: Build desktop main process
        run: pnpm build:desktop-main

      - name: Package Windows desktop app
        run: pnpm exec electron-builder --win --x64 --config electron-builder.yml --publish never

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-installer-x64
          path: release/*Setup*.exe
          if-no-files-found: error

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-portable-x64
          path: |
            release/*.exe
            !release/*Setup*.exe
          if-no-files-found: error
