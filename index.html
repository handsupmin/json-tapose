            "@type": "Question",
            "name": "What is JSON diff?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "JSON diff is the process of comparing two JSON objects or files and identifying the differences between them — which keys were added, removed, or changed. A JSON diff tool like JSONtapose displays these differences visually with color-coded highlighting, making it easy to review changes at a glance."

            "@type": "Question",

            }

          {
            "@type": "Question",
            "name": "Is JSONtapose free to use?",

            "@type": "Question",
            "name": "Is my data safe when using JSONtapose?",

              "text": "Yes. JSONtapose processes all data 100% client-side in your browser. Your JSON or YAML data is never sent to any server and never leaves your device. This makes it safe for comparing sensitive configuration files, API responses, or private data."

          },
          {
            "@type": "Question",
            "name": "Does JSONtapose support YAML comparison?",

              "text": "Yes. JSONtapose supports both JSON and YAML comparison. You can switch between JSON mode and YAML mode using the toggle in the header, or go directly to jsontapose.com/yaml-compare for YAML-specific comparison."
            }
          },
          {
            "@type": "Question",
            "name": "What is the difference between JSON diff and text diff?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A text diff compares files line-by-line and is sensitive to formatting, whitespace, and key order. A JSON-aware diff (semantic diff) understands the structure of JSON — it compares values regardless of key order, indentation, or formatting style. JSONtapose performs a semantic JSON comparison, so two JSON objects with the same data but different key order or whitespace are correctly identified as equal."
            }
          },
          {
            "@type": "Question",
            "name": "Can JSONtapose compare large JSON files?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. JSONtapose is optimized to handle large JSON files up to 10MB with virtualized rendering for performance. The comparison remains fast and responsive even with deeply nested or large JSON structures."
            }
          },

            "name": "What is the JSON tree viewer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The JSON tree viewer (available at jsontapose.com/treeviewer) is an interactive tool that displays JSON data as a collapsible tree structure. You can expand and collapse any node to explore complex nested JSON objects. It's useful for visualizing and navigating deeply nested data structures."
            }
          },
          {
            "@type": "Question",

              "text": "Once loaded, JSONtapose works offline — all processing is done locally in your browser with no network requests needed. You can bookmark the page and use it without an internet connection after the initial load."
            }
          }
        ]

    <!-- Accessibility improvements -->
    <script>
      // Check for dark mode preference and set theme accordingly
      if (
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
      ) {
        document.documentElement.setAttribute("data-theme", "dark");
      }

      // Listen for changes in color scheme preference
      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", (event) => {
          const newTheme = event.matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", newTheme);
        });
