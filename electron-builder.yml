appId: com.jsontapose.desktop
productName: JSONtapose
directories:
  output: release
files:
  - dist-desktop/**/*
  - desktop-dist/**/*
  - package.json
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
